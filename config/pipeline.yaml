# ContentPipe Pipeline 配置
# 个性化覆盖请创建 config/pipeline.local.yaml（不会被提交）

pipeline:
  # 默认平台
  default_platform: "wechat"

  # LLM 调用模式: direct（直接调 API）或 gateway（通过 OpenClaw 代理）
  llm_mode: "gateway"

  # 默认模型（首次运行向导会自动检测可用模型）
  default_llm: "openai-codex/gpt-5.4-mini"

  # gateway 地址（通常从 OPENCLAW_GATEWAY_URL 环境变量读取）
  gateway_url: ""

  # blank-agent ID（通常由 install-agent 自动创建）
  gateway_agent_id: "contentpipe-blank"

  # 各角色模型覆盖（留空 = 使用 default_llm）
  # 首次运行向导或设置页面会帮你配置
  llm_overrides: {}
  image_engine: llm-browser:chatgpt

  # 图片生成模式: auto（AI 自动生成）或 manual（用户手动上传）
  # manual 模式下，AI 导演审核通过后必须上传全部配图，否则弹窗提示
  image_mode: manual

  # AI 导演默认配图风格（对应 templates/wechat/ 下的模板）
  # 可选值：tech-a, tech-b, government-a, government-b, office-a, office-b,
  #         marketing-a, marketing-b, finance-a, finance-b, academic-a, academic-b,
  #         game-a, game-b, education-a, education-b, medical-a, medical-b,
  #         legal-a, legal-b, travel-a, travel-b, base
  # 设置后，Director 输出的 visual_plan.style 将强制使用此值
  director_default_style: ""

# Scout 配置
scout:
  domain_keywords:
  - AI
  - 科技
  - 互联网
  - 产品
  suggestions_count: 5

# 微信公众号发布配置
wechat:
  author: ""
