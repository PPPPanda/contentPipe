# ContentPipe Pipeline 配置
# LLM 调用模式: direct（直接调 API）或 gateway（通过 OpenClaw 代理）

pipeline:
  # 默认平台
  default_platform: "wechat"

  # LLM 调用模式: direct | gateway
  llm_mode: "gateway"

  # 默认模型
  default_llm: "dashscope/qwen3.5-plus"

  # gateway 地址（llm_mode=gateway 时使用）
  gateway_url: "http://localhost:18789"

  # blank-agent 执行平面（用于低污染文件产物生成）
  gateway_agent_id: "contentpipe-blank"

  # 各角色模型覆盖
  llm_overrides:
    scout: "anthropic/claude-sonnet-4-6"
    researcher: "anthropic/claude-sonnet-4-6"
    writer: "openai-codex/gpt-5.4"
    de_ai_editor: "anthropic/claude-sonnet-4-6"
    director: "anthropic/claude-opus-4-6"
    director_refine: "dashscope/qwen3.5-plus"

# Scout 配置
scout:
  domain_keywords:
    - "AI"
    - "科技"
    - "互联网"
    - "产品"
    - "Agent"
  suggestions_count: 5

# 账号配置
accounts:
  wechat:
    author: "ContentPipe"
    # appid/secret 通过环境变量: WECHAT_APPID, WECHAT_SECRET
