# ContentPipe Pipeline 配置
# 个性化覆盖请创建 config/pipeline.local.yaml（不会被提交）

pipeline:
  # 默认平台
  default_platform: "wechat"

  # LLM 调用模式: direct（直接调 API）或 gateway（通过 OpenClaw 代理）
  llm_mode: "gateway"

  # 默认模型（首次运行向导会自动检测可用模型）
  default_llm: "anthropic-sonnet/claude-sonnet-4-6"

  # gateway 地址（通常从 OPENCLAW_GATEWAY_URL 环境变量读取）
  gateway_url: ""

  # blank-agent ID（通常由 install-agent 自动创建）
  gateway_agent_id: "contentpipe-blank"

  # 各角色模型覆盖（留空 = 使用 default_llm）
  # 首次运行向导或设置页面会帮你配置
  llm_overrides: {}
  image_engine: auto

# Scout 配置
scout:
  domain_keywords:
  - AI
  - 科技
  - 互联网
  - 产品
  suggestions_count: 5

# 微信公众号发布配置
wechat:
  author: ""
