<!-- 法律 B 模板：卡片导读型 / 深色模式安全 -->
<section style="max-width:574px;margin:0 auto;padding:0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#ffffff;color:#333333;">
  <section style="padding:18px 20px 0;background:#ffffff;">
    <p style="font-size:12px;color:#1f3a5f;letter-spacing:1.5px;margin:0;text-transform:uppercase;">法律解读</p>
  </section>

  <section style="padding:10px 20px 12px;background:#ffffff;">
    <h1 style="font-size:23px;font-weight:700;line-height:1.42;color:#111827;margin:0 0 10px;">{{title}}</h1>
    {% if subtitle %}<p style="font-size:14px;color:#666;margin:0 0 8px;line-height:1.6;">{{subtitle}}</p>{% endif %}
    <p style="font-size:13px;color:#888;margin:0;">{{author}} · {{date}}</p>
  </section>

  {% if cover_url %}
  <section style="padding:0 20px 16px;background:#ffffff;">
    <img src="{{cover_url}}" style="width:100%;display:block;border-radius:12px;" />
  </section>
  {% endif %}

  <section style="margin:0 20px 22px;padding:14px 16px;background:#f4f7fb;border:1px solid #e9e9e9;border-radius:10px;">
    <p style="font-size:13px;font-weight:700;color:#1f3a5f;margin:0 0 6px;">⚖️ 核心要点</p>
    <p style="font-size:15px;color:#4b5563;line-height:1.75;margin:0;">{{lead}}</p>
  </section>

  <section style="padding:0 20px 4px;background:#ffffff;">
    {{content}}
  </section>

  <section style="padding:12px 20px 28px;background:#ffffff;">
    <section style="padding:14px 16px;background:#ffffff;border:1px solid #ececec;border-radius:10px;">
      <p style="font-size:13px;color:#6b7280;line-height:1.7;margin:0;">{{cta|default('如果这篇内容对你有帮助，欢迎转发或收藏。')}}</p>
    </section>
    <section style="height:1px;background:#ececec;margin:18px 0 0;"></section>
  </section>
</section>
