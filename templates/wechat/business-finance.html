<!--
  商业财经模板 — 专业严谨
  适用：财经分析/投资/商业/职场
  主色：#2c3e50 (深蓝灰)  辅色：#e74c3c (警示红) / #27ae60 (涨绿)
-->

<section style="max-width:574px;margin:0 auto;padding:0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;font-size:16px;line-height:1.8;color:#2c3e50;">

  <!-- 顶部品牌条 -->
  <section style="background:#2c3e50;padding:12px 20px;text-align:center;">
    <p style="font-size:11px;color:#95a5a6;letter-spacing:3px;margin:0;">{{category|default('商业观察')}}</p>
  </section>

  <!-- 标题区 -->
  <section style="padding:24px 20px 16px;border-bottom:2px solid #2c3e50;">
    <h1 style="font-size:22px;font-weight:700;color:#1a1a1a;margin:0 0 8px;line-height:1.4;">{{title}}</h1>
    <p style="font-size:13px;color:#95a5a6;margin:0;">{{author}} · {{date}}</p>
  </section>

  <!-- 摘要 -->
  <section style="padding:16px 20px;background:#f8f9fa;border-left:4px solid #2c3e50;">
    <p style="font-size:14px;font-weight:600;color:#2c3e50;margin:0 0 4px;">核心要点</p>
    <p style="font-size:15px;color:#555;margin:0;line-height:1.6;">{{lead}}</p>
  </section>

  <!-- 正文 -->
  <section style="padding:20px;">
    <!-- 正文 h2 样式建议：font-size:18px;color:#2c3e50;font-weight:700;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid #ecf0f1; -->
    <!-- 正文 p 样式建议：color:#34495e;margin:12px 0;text-align:justify; -->
    <!-- 数据高亮：color:#e74c3c;font-weight:700;(跌) / color:#27ae60;font-weight:700;(涨) -->
    <!-- 引用建议：background:#f8f9fa;padding:12px 16px;border-left:3px solid #bdc3c7;color:#7f8c8d;font-style:italic; -->
    {{content}}
  </section>

  <!-- 免责声明 -->
  <section style="padding:16px 20px;background:#f8f9fa;margin:0 20px 20px;border-radius:4px;">
    <p style="font-size:12px;color:#95a5a6;margin:0;line-height:1.5;">{{disclaimer|default('⚠️ 本文仅代表个人观点，不构成投资建议。市场有风险，决策需谨慎。')}}</p>
  </section>

  <!-- 尾部 -->
  <section style="text-align:center;padding:16px 20px;border-top:2px solid #2c3e50;">
    <p style="font-size:12px;color:#95a5a6;margin:0;">— END —</p>
  </section>

</section>
