<!-- 旅游 A 模板：稳妥正文型 / 深色模式安全 -->
<section style="max-width:574px;margin:0 auto;padding:0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#ffffff;color:#333333;">
  <section style="height:4px;background:#0ea5a4;border-radius:2px;"></section>

  <section style="padding:24px 20px 14px;text-align:center;background:#ffffff;">
    <section style="display:inline-block;border:1px solid #0ea5a4;color:#0ea5a4;font-size:12px;padding:4px 12px;border-radius:999px;line-height:1.2;">旅行攻略</section>
    <h1 style="font-size:24px;font-weight:700;line-height:1.45;color:#1f2937;margin:14px 0 10px;">{{title}}</h1>
    <p style="font-size:13px;color:#777;margin:0;">{{author}} · {{date}}</p>
  </section>

  {% if cover_url %}
  <section style="padding:0 20px 18px;background:#ffffff;">
    <img src="{{cover_url}}" style="width:100%;display:block;border-radius:10px;" />
  </section>
  {% endif %}

  <section style="margin:0 20px 22px;padding:14px 16px;background:#ffffff;border:1px solid #ececec;border-left:4px solid #0ea5a4;border-radius:0 8px 8px 0;">
    <p style="font-size:14px;color:#555;line-height:1.75;margin:0;"><strong style="color:#0ea5a4;font-weight:700;">导读｜</strong>{{lead}}</p>
  </section>

  <section style="padding:0 20px 4px;background:#ffffff;">
    {{content}}
  </section>

</section>
