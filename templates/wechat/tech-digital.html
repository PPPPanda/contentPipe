<!--
  科技数码模板 — 深色科技感
  适用：AI/科技/数码评测/互联网趋势
  主色：#1e90ff (道奇蓝)  辅色：#0d1117 (深背景)
-->

<section style="max-width:574px;margin:0 auto;padding:0;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;font-size:16px;line-height:1.8;color:#e6edf3;">

  <!-- 顶部装饰条 -->
  <section style="height:4px;background:linear-gradient(90deg,#1e90ff,#00d4aa);border-radius:2px;"></section>

  <!-- 标题卡片 -->
  <section style="background:#0d1117;padding:28px 20px 20px;text-align:center;">
    <p style="font-size:12px;color:#1e90ff;letter-spacing:4px;margin:0 0 12px;text-transform:uppercase;">{{category|default('TECH INSIGHT')}}</p>
    <h1 style="font-size:22px;font-weight:700;color:#ffffff;margin:0 0 12px;line-height:1.4;">{{title}}</h1>
    <p style="font-size:13px;color:#8b949e;margin:0;">{{author}} · {{date}}</p>
  </section>

  <!-- 导语 -->
  <section style="background:#161b22;padding:16px 20px;margin:0;">
    <section style="border-left:3px solid #1e90ff;padding-left:14px;">
      <p style="font-size:15px;color:#8b949e;margin:0;line-height:1.6;font-style:italic;">{{lead}}</p>
    </section>
  </section>

  <!-- 正文 -->
  <section style="background:#0d1117;padding:20px;">
    <!-- 正文 h2 样式建议：font-size:18px;color:#1e90ff;border-bottom:1px solid #21262d;padding-bottom:8px; -->
    <!-- 正文 p 样式建议：color:#c9d1d9;margin:12px 0; -->
    <!-- 正文 blockquote 样式建议：border-left:3px solid #30363d;padding:8px 14px;color:#8b949e;background:#161b22; -->
    <!-- 正文配图建议：width:100%;border-radius:8px;margin:16px 0; -->
    {{content}}
  </section>

  <!-- 关键数据卡片（可选） -->
  <!--
  <section style="background:#161b22;padding:16px 20px;margin:0;">
    <section style="display:flex;text-align:center;">
      <section style="flex:1;padding:8px;">
        <p style="font-size:24px;font-weight:700;color:#1e90ff;margin:0;">{{stat1_value}}</p>
        <p style="font-size:12px;color:#8b949e;margin:4px 0 0;">{{stat1_label}}</p>
      </section>
      <section style="flex:1;padding:8px;">
        <p style="font-size:24px;font-weight:700;color:#00d4aa;margin:0;">{{stat2_value}}</p>
        <p style="font-size:12px;color:#8b949e;margin:4px 0 0;">{{stat2_label}}</p>
      </section>
      <section style="flex:1;padding:8px;">
        <p style="font-size:24px;font-weight:700;color:#f0883e;margin:0;">{{stat3_value}}</p>
        <p style="font-size:12px;color:#8b949e;margin:4px 0 0;">{{stat3_label}}</p>
      </section>
    </section>
  </section>
  -->

  <!-- 尾部 -->
  <section style="background:#0d1117;padding:20px;text-align:center;">
    <section style="height:1px;background:#21262d;margin-bottom:16px;"></section>
    <p style="font-size:12px;color:#484f58;margin:0;">— END —</p>
  </section>

  <!-- 底部装饰条 -->
  <section style="height:4px;background:linear-gradient(90deg,#00d4aa,#1e90ff);border-radius:2px;"></section>

</section>
